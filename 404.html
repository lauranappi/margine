<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pagina non trovata — Margine</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=Source+Serif+4:ital,opsz,wght@0,8..60,300;0,8..60,400;1,8..60,300&display=swap" rel="stylesheet">
  <link rel="icon" type="image/svg+xml" href="/margine/favicon.svg">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f5f0e8; --ink: #2c1f0e; --ink-mid: #6b5540;
      --ink-light: #a08c75; --accent: #7a4f2d; --border: #d4c4ad;
      --serif: 'Playfair Display', Georgia, serif;
      --body: 'Source Serif 4', Georgia, serif;
    }
    body {
      background: var(--bg); color: var(--ink);
      font-family: var(--body); font-weight: 300;
      min-height: 100vh; display: flex; flex-direction: column;
    }
    nav {
      border-bottom: 1px solid var(--border);
      padding: 1.4rem 2rem; display: flex; align-items: baseline; gap: 2rem;
    }
    .nav-logo {
      font-family: var(--serif); font-size: 22px; font-weight: 500;
      color: var(--ink); text-decoration: none;
    }
    .main {
      flex: 1; display: flex; align-items: center; justify-content: center;
      padding: 4rem 2rem; text-align: center;
    }
    .inner { max-width: 480px; }
    .num {
      font-family: var(--serif); font-size: 100px; font-weight: 400;
      color: #ede7d9; line-height: 1; margin-bottom: 1rem;
    }
    h1 {
      font-family: var(--serif); font-size: 28px; font-weight: 400;
      color: var(--ink); margin-bottom: 1rem;
    }
    p { font-size: 17px; color: var(--ink-mid); line-height: 1.7; margin-bottom: 2rem; }
    a.btn {
      display: inline-block; font-size: 14px; color: var(--accent);
      border: 1px solid var(--border); border-radius: 3px;
      padding: 0.6rem 1.4rem; text-decoration: none; transition: background 0.2s;
    }
    a.btn:hover { background: #ede7d9; }
    footer {
      border-top: 1px solid var(--border); padding: 1.8rem 2rem;
      text-align: center; font-size: 12px; color: var(--ink-light);
    }
  </style>
</head>
<body>
  <nav>
    <a href="/margine/" class="nav-logo">Margine</a>
  </nav>
  <div class="main">
    <div class="inner">
      <div class="num">404</div>
      <h1>Questa pagina non esiste</h1>
      <p>O non è mai esistita, o è stata spostata, o l'URL è sbagliato. In ogni caso, non c'è niente da vedere qui.</p>
      <a href="/margine/" class="btn">← Torna alla homepage</a>
    </div>
  </div>
  <footer>Margine · © 2026 Laura Nappi</footer>
</body>
</html>
